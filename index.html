<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>어신의 도구 AI - 왕초보 가이드</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 15px; background: #0f172a; color: #fff; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* 💡 왕초보용 '하나하나' 설명판 */
        .tutorial-box { background: #1e293b; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 2px solid #fee500; text-align: left; }
        .tutorial-title { font-size: 16px; font-weight: 900; color: #fee500; display: block; margin-bottom: 10px; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        .tutorial-item { font-size: 13px; line-height: 1.6; color: #cbd5e1; margin-bottom: 8px; position: relative; padding-left: 20px; }
        .tutorial-item::before { content: "📍"; position: absolute; left: 0; }
        .important { color: #ff4757; font-weight: bold; text-decoration: underline; }

        /* 사진 영역 */
        #canvas-wrap { 
            width: 100%; height: 320px; background: #000; 
            border-radius: 15px; margin-bottom: 15px; border: 2px solid #334155;
            position: relative; overflow: hidden; touch-action: none;
        }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        
        /* 실시간 안내바 */
        #guide-msg { 
            position: absolute; bottom: 0; width: 100%; background: #1e293b; 
            color: #fee500; font-size: 13px; padding: 12px; box-sizing: border-box; font-weight: 900; border-top: 2px solid #fee500;
        }

        /* UI 버튼 및 입력 */
        .ui-box { background: #1e293b; padding: 15px; border-radius: 15px; border: 1px solid #334155; }
        .row { display: flex; gap: 8px; margin-bottom: 10px; }
        select, input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #475569; background: #0f172a; color: white; font-size: 15px; outline: none; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 16px; }
        .btn-up { background: #fee500; color: #3c1e1e; margin-bottom: 10px; box-shadow: 0 4px 0 #bfa800; }
        .btn-calc { background: #0ea5e9; color: white; box-shadow: 0 4px 0 #0284c7; }
        .btn-reset { background: #444; color: #ccc; margin-top: 15px; font-size: 12px; padding: 10px; }

        #result-card { display: none; background: #1e293b; padding: 25px; border-radius: 20px; border: 4px solid #38bdf8; margin-top: 20px; }
        #file-input { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #38bdf8; margin-top: 10px;">어신의 도구 AI ⚖️</h2>
    
    <div class="tutorial-box">
        <span class="tutorial-title">📸 사진 찍을 때 꼭 지켜주세요!</span>
        <div class="tutorial-item">신용카드를 물고기 바로 옆에 <span class="important">가로 방향</span>으로 놓으세요.</div>
        <div class="tutorial-item">물고기와 카드가 <span class="important">평행(일직선)</span>이 되어야 정확합니다.</div>
        <div class="tutorial-item">비스듬히 찍지 말고 <span class="important">정위에서 수직</span>으로 찍으세요.</div>
        <div class="tutorial-item">카드의 <span class="important">양쪽 끝 모서리</span>를 최대한 정확히 찍어야 합니다.</div>
    </div>

    <input type="file" id="file-input" accept="image/*">
    <button class="btn btn-up" onclick="document.getElementById('file-input').click()">📱 1단계: 사진 불러오기</button>
    
    <div id="canvas-wrap">
        <canvas id="mainCanvas"></canvas>
        <div id="guide-msg">대기 중... 먼저 사진을 불러오세요!</div>
    </div>

    <div class="ui-box">
        <div class="row">
            <select id="fishType">
                <option value="광어">광어</option><option value="우럭">우럭</option>
                <option value="참돔">참돔</option><option value="감성돔">감성돔</option>
                <option value="농어">농어</option>
            </select>
            <input type="text" id="fisherName" placeholder="조사님 성함">
        </div>
        <button class="btn btn-calc" onclick="showRank()">⚖️ 2단계: 서열 확인하기</button>
        <button class="btn btn-reset" onclick="resetAll()">새로 찍기</button>
    </div>

    <div id="result-card">
        <div style="font-size: 12px; color: #38bdf8; font-weight: bold;">전국 낚시 서열 인증서</div>
        <div id="display-rank" style="font-size: 36px; font-weight: 900; margin: 10px 0;">도시 어부</div>
        <div id="res-info" style="font-size: 18px; margin-bottom: 10px;"></div>
        <p id="res-msg" style="font-size: 14px; color: #94a3b8;"></p>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const guide = document.getElementById('guide-msg');
    let originalImg = null, points = [], step = 0, cardPx = 0;

    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            const img = new Image();
            img.onload = function() {
                originalImg = img;
                canvas.width = img.width; canvas.height = img.height;
                resetAll();
                step = 1;
                guide.innerHTML = "💳 [카드 측정] 카드의 왼쪽 끝과 오른쪽 끝을 찍으세요!";
                draw();
            }
            img.src = evt.target.result;
        }
        reader.readAsDataURL(file);
    });

    canvas.addEventListener('pointerdown', function(e) {
        if (!originalImg || step > 2) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        points.push({x, y});

        if (step === 1 && points.length === 2) {
            cardPx = Math.sqrt(Math.pow(points[0].x - points[1].x, 2) + Math.pow(points[0].y - points[1].y, 2));
            step = 2;
            guide.innerHTML = "🐟 [고기 측정] 물고기 머리 끝과 꼬리 끝을 찍으세요!";
        } else if (step === 2 && points.length === 4) {
            const fishPx = Math.sqrt(Math.pow(points[2].x - points[3].x, 2) + Math.pow(points[2].y - points[3].y, 2));
            const cm = (fishPx / cardPx) * 8.56;
            window.finalCm = cm.toFixed(1);
            guide.innerHTML = "✅ 측정 완료! 아래 [서열 확인하기]를 누르세요.";
            step = 3;
        }
        draw();
    });

    function draw() {
        if (!originalImg) return;
        ctx.drawImage(originalImg, 0, 0);
        if (points.length >= 2) drawLine(points[0], points[1], '#fee500');
        if (points.length >= 4) drawLine(points[2], points[3], '#0ea5e9');
        points.forEach((p, i) => {
            ctx.beginPath(); ctx.arc(p.x, p.y, canvas.width * 0.015, 0, Math.PI*2);
            ctx.fillStyle = i < 2 ? '#fee500' : '#0ea5e9'; ctx.fill();
        });
    }

    function drawLine(p1, p2, color) {
        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = color; ctx.lineWidth = canvas.width * 0.01; ctx.stroke();
    }

    function resetAll() {
        points = []; cardPx = 0; step = originalImg ? 1 : 0;
        document.getElementById('result-card').style.display = 'none';
        if(originalImg) guide.innerHTML = "💳 [카드 측정] 카드의 왼쪽 끝과 오른쪽 끝을 찍으세요!";
        else guide.innerHTML = "대기 중... 먼저 사진을 불러오세요!";
        draw();
    }

    function showRank() {
        if(!window.finalCm) return alert("먼저 사진 위를 터치하여 측정해주세요!");
        const type = document.getElementById('fishType').value;
        const name = document.getElementById('fisherName').value || "조사";
        const resCard = document.getElementById('result-card');
        
        document.getElementById('res-info').innerText = `${type} / ${window.finalCm}cm`;
        document.getElementById('res-msg').innerText = `"${name}님, 멋진 조과 축하드립니다!"`;
        resCard.style.display = "block";
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>

</body>
</html>
