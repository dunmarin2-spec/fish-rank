<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>어신의 도구 AI - 초정밀 가이드</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 15px; background: #0f172a; color: #fff; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* 💡 형님이 말씀하신 '하나하나' 친절 가이드 */
        .step-box { background: #1e293b; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 2px solid #fee500; text-align: left; }
        .step-item { font-size: 14px; line-height: 1.6; margin-bottom: 10px; padding-left: 30px; position: relative; }
        .step-num { position: absolute; left: 0; background: #fee500; color: #000; width: 22px; height: 22px; border-radius: 50%; text-align: center; font-weight: 900; line-height: 22px; font-size: 13px; }
        .hl { color: #fee500; font-weight: 900; text-decoration: underline; }
        .hl-blue { color: #0ea5e9; font-weight: 900; text-decoration: underline; }

        /* 캔버스 영역 */
        #canvas-wrap { 
            width: 100%; height: 350px; background: #000; 
            border-radius: 15px; margin-bottom: 15px; border: 2px solid #334155;
            position: relative; overflow: hidden; touch-action: none;
        }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        
        /* 💡 실시간 '지금 뭐 할 차례인지' 알려주는 전광판 */
        #live-guide { 
            position: absolute; top: 0; width: 100%; background: rgba(0,0,0,0.8); 
            color: #fff; font-size: 15px; padding: 10px; box-sizing: border-box; font-weight: 900; border-bottom: 2px solid #fee500;
        }

        .ui-box { background: #1e293b; padding: 15px; border-radius: 15px; border: 1px solid #334155; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 16px; margin-bottom: 10px; }
        .btn-up { background: #fee500; color: #3c1e1e; }
        .btn-calc { background: #0ea5e9; color: white; }
        
        #result-card { display: none; background: #000; padding: 20px; border-radius: 15px; border: 3px solid #0ea5e9; margin-top: 15px; }
        #file-input { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #fee500; margin-top: 5px;">어신의 도구 AI ⚖️</h2>
    
    <div class="step-box">
        <div class="step-item">
            <span class="step-num">1</span>
            <span class="hl">신용카드 양끝</span>(왼쪽/오른쪽)을 순서대로 찍으세요. <br>기준(8.56cm)을 잡는 단계입니다.
        </div>
        <div class="step-item">
            <span class="step-num">2</span>
            카드를 찍고 나면 바로 <span class="hl-blue">물고기 양끝</span>(머리/꼬리)을 찍으세요. <br>실제 크기를 계산하는 단계입니다.
        </div>
        <div class="step-item" style="margin-bottom:0;">
            <span class="step-num">3</span>
            [서열 확인] 버튼을 눌러 계급을 확인하세요!
        </div>
    </div>

    <input type="file" id="file-input" accept="image/*">
    <button class="btn btn-up" onclick="document.getElementById('file-input').click()">📸 대물 사진 불러오기</button>
    
    <div id="canvas-wrap">
        <canvas id="mainCanvas"></canvas>
        <div id="live-guide">사진을 먼저 불러와주세요!</div>
    </div>

    <div class="ui-box">
        <input type="text" id="fisherName" placeholder="조사님 성함 입력" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; background:#0f172a; border:1px solid #475569; color:#fff; box-sizing:border-box;">
        <button class="btn btn-calc" onclick="showRank()">⚖️ 서열 확인하기</button>
    </div>

    <div id="result-card">
        <div id="res-rank" style="font-size:30px; font-weight:900; color:#0ea5e9;"></div>
        <div id="res-size" style="font-size:20px; margin:10px 0;"></div>
        <p id="res-msg" style="color:#94a3b8; font-size:14px;"></p>
        <button class="btn" style="background:#444; color:#fff; margin-top:10px;" onclick="location.reload()">새로 측정</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const liveGuide = document.getElementById('live-guide');
    let originalImg = null, points = [], step = 0, cardPx = 0;

    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            const img = new Image();
            img.onload = function() {
                originalImg = img;
                canvas.width = img.width; canvas.height = img.height;
                resetState();
                draw();
            }
            img.src = evt.target.result;
        }
        reader.readAsDataURL(file);
    });

    function resetState() {
        points = []; step = 1; cardPx = 0;
        liveGuide.innerHTML = "💳 [1단계] 사진 속 <b style='color:#fee500'>신용카드 양끝</b>을 찍으세요!";
        liveGuide.style.borderBottomColor = "#fee500";
    }

    canvas.addEventListener('pointerdown', function(e) {
        if (!originalImg || step > 2) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        points.push({x, y});

        if (step === 1 && points.length === 2) {
            cardPx = Math.sqrt(Math.pow(points[0].x - points[1].x, 2) + Math.pow(points[0].y - points[1].y, 2));
            step = 2;
            liveGuide.innerHTML = "🐟 [2단계] 이제 <b style='color:#0ea5e9'>물고기 머리와 꼬리 끝</b>을 찍으세요!";
            liveGuide.style.borderBottomColor = "#0ea5e9";
        } else if (step === 2 && points.length === 4) {
            const fishPx = Math.sqrt(Math.pow(points[2].x - points[3].x, 2) + Math.pow(points[2].y - points[3].y, 2));
            window.finalCm = ((fishPx / cardPx) * 8.56).toFixed(1);
            liveGuide.innerHTML = "✅ 완료! 아래 [서열 확인하기] 버튼을 누르세요.";
            liveGuide.style.borderBottomColor = "#2ecc71";
            step = 3;
        }
        draw();
    });

    function draw() {
        if (!originalImg) return;
        ctx.drawImage(originalImg, 0, 0);
        if (points.length >= 2) drawLine(points[0], points[1], '#fee500');
        if (points.length >= 4) drawLine(points[2], points[3], '#0ea5e9');
        points.forEach((p, i) => {
            ctx.beginPath(); ctx.arc(p.x, p.y, canvas.width * 0.015, 0, Math.PI*2);
            ctx.fillStyle = i < 2 ? '#fee500' : '#0ea5e9'; ctx.fill();
        });
    }

    function drawLine(p1, p2, color) {
        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = color; ctx.lineWidth = canvas.width * 0.01; ctx.stroke();
    }

    function showRank() {
        if(!window.finalCm) return alert("카드 찍고 고기까지 찍어야 계산이 됩니다!");
        const name = document.getElementById('fisherName').value || "조사";
        const resCard = document.getElementById('result-card');
        document.getElementById('res-rank').innerText = window.finalCm > 40 ? "용왕의 아들" : "도시 어부";
        document.getElementById('res-size').innerText = `${window.finalCm}cm 기록`;
        document.getElementById('res-msg').innerText = `"${name}님, 오늘 손맛 제대로 보셨네요!"`;
        resCard.style.display = "block";
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>

</body>
</html>
