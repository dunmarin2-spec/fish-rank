<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>어신의 도구 - 낚시 서열 정리기</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@900&display=swap');
        
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; background: #0f172a; color: #fff; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { color: #38bdf8; font-size: 28px; margin-bottom: 5px; letter-spacing: -1px; }
        p.desc { font-size: 13px; opacity: 0.7; margin-bottom: 25px; }

        /* 입력창 스타일 */
        .input-card { background: #1e293b; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid #334155; }
        select, input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #475569; background: #0f172a; color: white; font-size: 16px; box-sizing: border-box; outline: none; }
        select:focus, input:focus { border-color: #38bdf8; }

        /* 버튼 스타일 */
        .btn-calc { width: 100%; padding: 15px; background: #0ea5e9; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .btn-calc:active { transform: scale(0.98); background: #0284c7; }

        /* 서열 카드 결과 (이게 핵심!) */
        #result-card { display: none; margin-top: 25px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 30px 20px; border-radius: 20px; border: 3px solid #38bdf8; position: relative; overflow: hidden; }
        #result-card.legend { border-color: #fbbf24; box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); }
        
        .rank-title { font-size: 14px; color: #38bdf8; margin-bottom: 10px; }
        .rank-name { font-size: 42px; font-weight: 900; margin-bottom: 15px; text-shadow: 0 0 15px rgba(56, 189, 248, 0.5); }
        .legend .rank-name { color: #fbbf24; text-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; border-top: 1px solid #334155; padding-top: 20px; }
        .stat-item span { display: block; font-size: 12px; opacity: 0.6; }
        .stat-item b { font-size: 18px; color: #f8fafc; }

        .rank-msg { font-size: 15px; line-height: 1.5; color: #94a3b8; }
        .btn-save { margin-top: 20px; background: #22c55e; padding: 12px; border-radius: 8px; border: none; color: white; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>어신의 도구 ⚖️</h1>
    <p class="desc">잡으신 고기, 전국에서 몇 등인지 서열 정리해 드립니다.</p>

    <div class="input-card">
        <select id="fishType">
            <option value="광어">광어 (Flatfish)</option>
            <option value="우럭">우럭 (Rockfish)</option>
            <option value="참돔">참돔 (Red Sea Bream)</option>
            <option value="감성돔">감성돔 (Black Sea Bream)</option>
            <option value="농어">농어 (Sea Bass)</option>
            <option value="쭈꾸미">쭈꾸미 (Webfoot Octopus)</option>
        </select>
        <input type="number" id="fishSize" placeholder="크기 입력 (cm)" step="0.1">
        <input type="text" id="fisherName" placeholder="조사님 성함 (예: 찬둥)">
        <button class="btn-calc" onclick="calculateRank()">서열 확인하기</button>
    </div>

    <div id="result-card">
        <div class="rank-title">전국 낚시 서열 인증</div>
        <div id="display-rank" class="rank-name">도시 어부</div>
        
        <div class="stat-grid">
            <div class="stat-item">
                <span>어종 / 크기</span>
                <b id="res-info">광어 / 45cm</b>
            </div>
            <div class="stat-item">
                <span>상위 %</span>
                <b id="res-percent">상위 15%</b>
            </div>
        </div>

        <p id="res-msg" class="rank-msg">"오~ 동네 방구 좀 뀌시겠는데요?"</p>
        
        <button class="btn-save" onclick="location.reload()">다시 측정하기</button>
        <p style="font-size: 10px; margin-top: 15px; opacity: 0.4;">© 어신의 도구 - 찬둥의 작업실</p>
    </div>
</div>

<script>
    function calculateRank() {
        const type = document.getElementById('fishType').value;
        const size = parseFloat(document.getElementById('fishSize').value);
        const name = document.getElementById('fisherName').value || "무명조사";
        const resultCard = document.getElementById('result-card');

        if (!size) return alert('크기를 입력해주세요!');

        // 💡 어종별 기준치 (데이터베이스 대신 로직으로 서열 계산)
        // 기준: 광어 8짜, 우럭 5짜, 참돔 9짜 등
        let baseSize = 40;
        if (type === '광어') baseSize = 85;
        if (type === '우럭') baseSize = 55;
        if (type === '참돔') baseSize = 95;
        if (type === '감성돔') baseSize = 65;
        if (type === '농어') baseSize = 105;
        if (type === '쭈꾸미') baseSize = 15; // 마리수 대신 길이(머리) 기준 예시

        const score = (size / baseSize) * 100;
        let rank = "";
        let percent = "";
        let msg = "";

        if (score >= 95) {
            rank = "전설의 조사";
            percent = "상위 0.1%";
            msg = `${name}님, 오늘 낚시 접으셔도 됩니다. 박물관으로 가시죠!`;
            resultCard.classList.add('legend');
        } else if (score >= 80) {
            rank = "용왕의 아들";
            percent = "상위 3%";
            msg = "어디 가서 낚시 좀 한다고 어깨 펴고 다니셔도 됩니다!";
        } else if (score >= 60) {
            rank = "바다의 무법자";
            percent = "상위 12%";
            msg = "훌륭합니다! 밴드에 자랑하면 댓글 50개 각이네요.";
        } else if (score >= 40) {
            rank = "도시 어부";
            percent = "상위 35%";
            msg = "손맛 좀 보셨군요? 회 한 점에 소주 한 잔 딱입니다.";
        } else {
            rank = "방구석 낚시꾼";
            percent = "상위 80%";
            msg = "에이~ 방생하셨죠? 다음엔 대물 기원합니다!";
        }

        // 데이터 채우기
        document.getElementById('display-rank').innerText = rank;
        document.getElementById('res-info').innerText = `${type} / ${size}cm`;
        document.getElementById('res-percent').innerText = percent;
        document.getElementById('res-msg').innerText = `"${msg}"`;
        
        resultCard.style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>

</body>
</html>
