<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>어신의 도구 - 정밀 돋보기 버전</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 10px; background: #0f172a; color: #fff; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* 가이드 박스 */
        .full-guide { background: #1e293b; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 3px solid #fee500; text-align: left; }
        .guide-title { font-size: 18px; font-weight: 900; color: #fee500; display: block; margin-bottom: 10px; text-align: center; border-bottom: 2px solid #334155; padding-bottom: 5px; }
        .step { font-size: 13px; line-height: 1.5; margin-bottom: 8px; color: #cbd5e1; }
        .step b { color: #0ea5e9; }

        /* 캔버스 및 돋보기 영역 */
        #canvas-wrap { 
            width: 100%; height: 380px; background: #000; border-radius: 15px; 
            margin-bottom: 10px; border: 2px solid #334155; position: relative; 
            overflow: hidden; touch-action: none; 
        }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        
        /* 💡 핵심: 돋보기 창 */
        #magnifier {
            position: absolute; top: 10px; right: 10px; width: 120px; height: 120px;
            border: 3px solid #fee500; border-radius: 50%; overflow: hidden;
            display: none; background: #000; pointer-events: none; z-index: 100;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        #mag-canvas { width: 100%; height: 100%; }

        #live-status { 
            position: absolute; top: 0; width: 100%; background: rgba(0,0,0,0.8); 
            color: #fff; font-size: 13px; padding: 10px; font-weight: 900; border-bottom: 2px solid #fee500; 
        }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 17px; margin-bottom: 10px; }
        .btn-up { background: #fee500; color: #3c1e1e; }
        .btn-calc { background: #0ea5e9; color: white; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; background: #0f172a; border: 1px solid #475569; color: #fff; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="full-guide">
        <span class="guide-title">📏 사용 방법 (돋보기 기능 추가)</span>
        <div class="step">1. <b>[사진 불러오기]</b> 후 화면을 누르세요.</div>
        <div class="step">2. 손가락을 대면 <b>오른쪽 위에 확대창</b>이 뜹니다.</div>
        <div class="step">3. 돋보기를 보면서 <b>카드 양끝 -> 물고기 양끝</b> 순서로 누르세요.</div>
    </div>

    <input type="file" id="file-input" accept="image/*" style="display:none;">
    <button class="btn btn-up" onclick="document.getElementById('file-input').click()">📸 1. 내 사진 불러오기</button>
    
    <div id="canvas-wrap">
        <canvas id="mainCanvas"></canvas>
        <div id="magnifier"><canvas id="mag-canvas"></canvas></div>
        <div id="live-status">사진을 먼저 불러와주세요!</div>
    </div>

    <div style="background:#1e293b; padding:15px; border-radius:15px;">
        <select id="fishType" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; background:#0f172a; border:1px solid #475569; color:#fff;">
            <option value="광어">광어 (85cm)</option><option value="우럭">우럭 (55cm)</option>
            <option value="붕어">붕어 (45cm)</option><option value="배스">배스 (60cm)</option>
        </select>
        <input type="text" id="fisherName" placeholder="조사님 성함">
        <button class="btn btn-calc" onclick="showRank()">⚖️ 2. 서열 확인하기</button>
        <button class="btn" style="background:#444; color:#fff; font-size:12px; padding:10px;" onclick="location.reload()">새로 하기</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const mag = document.getElementById('magnifier');
    const magCanvas = document.getElementById('mag-canvas');
    const magCtx = magCanvas.getContext('2d');
    const liveStatus = document.getElementById('live-status');
    
    let originalImg = null, points = [], step = 0, cardPx = 0;

    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            const img = new Image();
            img.onload = function() {
                originalImg = img;
                canvas.width = img.width; canvas.height = img.height;
                magCanvas.width = 200; magCanvas.height = 200;
                points = []; step = 1; 
                liveStatus.innerHTML = "💳 [카드 터치] 돋보기를 보고 카드 양끝을 누르세요!";
                draw();
            }
            img.src = evt.target.result;
        }
        reader.readAsDataURL(file);
    });

    // 💡 돋보기 및 터치 로직
    function handlePointer(e) {
        if (!originalImg || step > 2) return;
        
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);

        // 돋보기 보여주기
        mag.style.display = 'block';
        magCtx.clearRect(0,0,200,200);
        magCtx.drawImage(canvas, x - 20, y - 20, 40, 40, 0, 0, 200, 200);
        // 돋보기 가운데 조준선
        magCtx.strokeStyle = 'red'; magCtx.lineWidth = 2;
        magCtx.beginPath(); magCtx.moveTo(100, 80); magCtx.lineTo(100, 120); magCtx.stroke();
        magCtx.beginPath(); magCtx.moveTo(80, 100); magCtx.lineTo(120, 100); magCtx.stroke();

        if (e.type === 'pointerup') {
            mag.style.display = 'none';
            points.push({x, y});
            if (step === 1 && points.length === 2) {
                cardPx = Math.sqrt(Math.pow(points[0].x - points[1].x, 2) + Math.pow(points[0].y - points[1].y, 2));
                step = 2;
                liveStatus.innerHTML = "🐟 [고기 터치] 이제 물고기 머리와 꼬리를 누르세요!";
            } else if (step === 2 && points.length === 4) {
                const fishPx = Math.sqrt(Math.pow(points[2].x - points[3].x, 2) + Math.pow(points[2].y - points[3].y, 2));
                window.finalCm = ((fishPx / cardPx) * 8.56).toFixed(1);
                liveStatus.innerHTML = "✅ 완료! [서열 확인] 버튼을 누르세요.";
                step = 3;
            }
            draw();
        }
    }

    canvas.addEventListener('pointerdown', handlePointer);
    canvas.addEventListener('pointermove', handlePointer);
    canvas.addEventListener('pointerup', handlePointer);

    function draw() {
        if (!originalImg) return;
        ctx.drawImage(originalImg, 0, 0);
        if (points.length >= 2) drawLine(points[0], points[1], '#fee500');
        if (points.length >= 4) drawLine(points[2], points[3], '#0ea5e9');
        points.forEach((p, i) => {
            ctx.beginPath(); ctx.arc(p.x, p.y, canvas.width * 0.015, 0, Math.PI*2);
            ctx.fillStyle = i < 2 ? '#fee500' : '#0ea5e9'; ctx.fill();
        });
    }

    function drawLine(p1, p2, color) {
        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = color; ctx.lineWidth = canvas.width * 0.01; ctx.stroke();
    }

    function showRank() {
        if(!window.finalCm) return alert("먼저 카드와 고기를 터치해주세요!");
        alert(`${window.finalCm}cm 기록 확인! 서열 인증을 시작합니다.`);
        // 결과 카드 로직 생략 (기존과 동일)
    }
</script>

</body>
</html>
