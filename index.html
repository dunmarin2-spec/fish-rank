<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>어신의 도구 - 찬둥 형님 모바일 최적화</title>
    <link rel="apple-touch-icon" href="https://postfiles.pstatic.net/MjAyMzExMTN_MTg2/Mda40_T8J1y508b_H8_0vM4N84_A_R84_A_R8_A_A/img.png?type=w773">
    <link rel="icon" href="https://postfiles.pstatic.net/MjAyMzExMTN_MTg2/Mda40_T8J1y508b_H8_0vM4N84_A_R84_A_R8_A_A/img.png?type=w773">
    <meta name="apple-mobile-web-app-title" content="어신의 도구">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        
        /* 💡 핵심: 화면에 꽉 차게 기본 세팅 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Pretendard', sans-serif; 
            margin: 0; padding: 10px; 
            background: #0f172a; color: #fff; 
            text-align: center;
            overflow-x: hidden; /* 가로 스크롤 방지 */
        }
        .container { 
            width: 100%; 
            max-width: 500px; 
            margin: 0 auto; 
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 설명판 */
        .full-guide { background: #1e293b; padding: 15px; border-radius: 15px; border: 3px solid #fee500; text-align: left; }
        .guide-title { font-size: 1.2rem; font-weight: 900; color: #fee500; display: block; margin-bottom: 12px; text-align: center; border-bottom: 1px solid #334155; padding-bottom: 8px; }
        .step { margin-bottom: 12px; font-size: 0.9rem; line-height: 1.6; padding-left: 25px; position: relative; }
        .step-num { position: absolute; left: 0; color: #fee500; font-weight: 900; font-size: 1rem; }
        .yellow { color: #fee500; font-weight: 900; }
        .blue { color: #0ea5e9; font-weight: 900; }
        .red { color: #ff4757; font-weight: 900; }

        /* 💡 핵심: 사진 영역이 폰 너비에 맞춰 꽉 차게 조정 */
        #canvas-wrap { 
            width: 100%; 
            aspect-ratio: 4 / 3; /* 화면 비율 유지 */
            background: #000; border-radius: 15px; 
            border: 2px solid #334155; position: relative; 
            overflow: hidden; touch-action: none; 
        }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        
        /* 돋보기 */
        #magnifier { 
            position: absolute; top: 10px; right: 10px; 
            width: 100px; height: 100px; 
            border: 3px solid #fee500; border-radius: 50%; 
            overflow: hidden; display: none; pointer-events: none; 
            z-index: 100; box-shadow: 0 0 20px rgba(0,0,0,0.8); 
        }
        #mag-canvas { width: 100%; height: 100%; }
        #live-status { 
            position: absolute; top: 0; width: 100%; 
            background: rgba(0,0,0,0.85); color: #fff; 
            font-size: 0.8rem; padding: 10px; font-weight: 900; 
            border-bottom: 2px solid #fee500; z-index: 10;
        }

        /* UI 박스 및 버튼 */
        .ui-box { background: #1e293b; padding: 15px; border-radius: 15px; border: 1px solid #334155; }
        select, input[type="text"] { 
            width: 100%; padding: 12px; margin-bottom: 10px; 
            border-radius: 10px; background: #0f172a; border: 1px solid #475569; 
            color: #fff; font-size: 1rem; 
        }
        .btn { 
            width: 100%; padding: 15px; border: none; border-radius: 10px; 
            font-weight: 900; cursor: pointer; font-size: 1.1rem; 
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-up { background: #fee500; color: #3c1e1e; box-shadow: 0 4px 0 #d1bc00; margin-bottom: 10px; }
        .btn-calc { background: #0ea5e9; color: white; box-shadow: 0 4px 0 #0284c7; }

        /* 결과 카드 */
        #result-card { display: none; background: #000; padding: 25px; border-radius: 20px; border: 4px solid #fee500; margin-top: 15px; }

        /* 수익 창출 구역 */
        .revenue-box { padding: 20px; background: #1e293b; border-radius: 15px; border: 2px solid #475569; }
        .kakao-pay { 
            background: #fee500; color: #3c1e1e; text-decoration: none; 
            display: block; padding: 15px; border-radius: 10px; 
            font-weight: 900; margin-bottom: 20px; font-size: 1rem; 
        }

        /* 쿠팡 검색창 보강 */
        .coupang-form {
            background: #fff; border-radius: 15px; padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .search-inner { display: flex; gap: 8px; }
        .search-inner input { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; color: #000; font-size: 0.9rem; }
        .search-inner button { background: #0073e9; color: #fff; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="full-guide">
        <span class="guide-title">📏 사용 방법</span>
        <div class="step"><span class="step-num">1.</span> 카드를 물고기 옆에 두고 수직으로 사진을 찍으세요.</div>
        <div class="step"><span class="step-num">2.</span> <span class="yellow">[내 사진 불러오기]</span> 버튼을 눌러주세요.</div>
        <div class="step"><span class="step-num">3.</span> 돋보기를 보고 <span class="yellow">카드 양 끝</span> -> <span class="blue">물고기 양 끝</span>을 터치하세요.</div>
    </div>

    <input type="file" id="file-input" accept="image/*" style="display:none;">
    <button class="btn btn-up" onclick="document.getElementById('file-input').click()">📸 내 사진 불러오기</button>
    
    <div id="canvas-wrap">
        <canvas id="mainCanvas"></canvas>
        <div id="magnifier"><canvas id="mag-canvas"></canvas></div>
        <div id="live-status">먼저 사진을 불러와주세요!</div>
    </div>

    <div class="ui-box">
        <select id="fishType">
            <optgroup label="🐟 바다/민물 42종">
                <option value="붕어">붕어 (45cm)</option>
                <option value="광어">광어 (85cm)</option>
                <option value="우럭">우럭 (55cm)</option>
                <option value="참돔">참돔 (95cm)</option>
                <option value="감성돔">감성돔 (60cm)</option>
                <option value="배스">배스 (60cm)</option>
                <option value="가물치">가물치 (90cm)</option>
                <option value="부시리">부시리 (140cm)</option>
                <option value="무늬오징어">무늬오징어</option>
                <option value="쏘가리">쏘가리 (55cm)</option>
            </optgroup>
        </select>
        <input type="text" id="fisherName" placeholder="조사님 성함">
        <button class="btn btn-calc" onclick="showRank()">⚖️ 서열 확인하기</button>
    </div>

    <div id="result-card">
        <div id="res-rank" style="font-size:32px; font-weight:900; color:#fee500;"></div>
        <div id="res-size" style="font-size:22px; margin:10px 0;"></div>
        <p id="res-msg" style="color:#94a3b8; font-size:14px;"></p>
    </div>

    <div class="revenue-box">
        <p style="font-size:0.8rem; margin-bottom:10px; color:#94a3b8;">찬둥이에게 커피 한 잔 후원하기</p>
        <a href="https://qr.kakaopay.com/FRK8J0SAD" class="kakao-pay" target="_blank">💛 카카오페이 송금</a>

        <div class="coupang-form">
            <form action="https://www.coupang.com/np/search" method="get" target="_blank">
                <div class="search-inner">
                    <input type="hidden" name="channel" value="AF4757238">
                    <input type="text" name="q" placeholder="낚시용품 최저가 검색">
                    <button type="submit">검색</button>
                </div>
            </form>
            <p style="font-size:10px; color:#999; margin:0;">"이 포스팅은 쿠팡 파트너스 활동으로 수수료를 제공받습니다."</p>
        </div>
    </div>
</div>

<script>
    const STANDARDS = {"붕어": 45, "광어": 85, "우럭": 55, "참돔": 95, "감성돔": 60, "배스": 60, "가물치": 90, "부시리": 140, "무늬오징어": 45, "쏘가리": 55, "잉어": 90, "메기": 80, "벵에돔": 55, "돌돔": 70, "방어": 110, "삼치": 110, "보리멸": 30, "도다리": 50, "볼락": 35, "쥐치": 40, "숭어": 85, "꺽지": 28};
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const mag = document.getElementById('magnifier');
    const magCanvas = document.getElementById('mag-canvas');
    const magCtx = magCanvas.getContext('2d');
    const liveStatus = document.getElementById('live-status');
    let originalImg = null, points = [], step = 0, cardPx = 0;

    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            const img = new Image();
            img.onload = function() {
                originalImg = img;
                canvas.width = img.width; canvas.height = img.height;
                magCanvas.width = 200; magCanvas.height = 200;
                points = []; step = 1; 
                liveStatus.innerHTML = "💳 [카드 터치] 돋보기를 보고 <b style='color:#fee500'>양 끝</b>을 누르세요!";
                draw();
            }
            img.src = evt.target.result;
        }
        reader.readAsDataURL(file);
    });

    function handlePointer(e) {
        if (!originalImg || step > 2) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);

        if (e.type === 'pointerdown' || e.type === 'pointermove') {
            mag.style.display = 'block';
            magCtx.clearRect(0,0,200,200);
            magCtx.drawImage(canvas, x - 20, y - 20, 40, 40, 0, 0, 200, 200);
            magCtx.strokeStyle = '#fee500'; magCtx.lineWidth = 2;
            magCtx.beginPath(); magCtx.moveTo(100, 70); magCtx.lineTo(100, 130); magCtx.stroke();
            magCtx.beginPath(); magCtx.moveTo(70, 100); magCtx.lineTo(130, 100); magCtx.stroke();
        }

        if (e.type === 'pointerup') {
            mag.style.display = 'none';
            points.push({x, y});
            if (step === 1 && points.length === 2) {
                cardPx = Math.sqrt(Math.pow(points[0].x - points[1].x, 2) + Math.pow(points[0].y - points[1].y, 2));
                step = 2;
                liveStatus.innerHTML = "🐟 [고기 터치] <b style='color:#0ea5e9'>물고기 양 끝</b>을 누르세요!";
            } else if (step === 2 && points.length === 4) {
                const fishPx = Math.sqrt(Math.pow(points[2].x - points[3].x, 2) + Math.pow(points[2].y - points[3].y, 2));
                window.finalCm = ((fishPx / cardPx) * 8.56).toFixed(1);
                liveStatus.innerHTML = "✅ 완료! 아래 [서열 확인] 버튼 클릭!";
                step = 3;
            }
            draw();
        }
    }

    canvas.addEventListener('pointerdown', handlePointer);
    canvas.addEventListener('pointermove', handlePointer);
    canvas.addEventListener('pointerup', handlePointer);

    function draw() {
        if (!originalImg) return;
        ctx.drawImage(originalImg, 0, 0);
        if (points.length >= 2) drawLine(points[0], points[1], '#fee500');
        if (points.length >= 4) drawLine(points[2], points[3], '#0ea5e9');
        points.forEach((p, i) => {
            ctx.beginPath(); ctx.arc(p.x, p.y, canvas.width * 0.015, 0, Math.PI*2);
            ctx.fillStyle = i < 2 ? '#fee500' : '#0ea5e9'; ctx.fill();
        });
    }

    function drawLine(p1, p2, color) {
        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = color; ctx.lineWidth = canvas.width * 0.012; ctx.stroke();
    }

    function showRank() {
        if(!window.finalCm) return alert("카드와 고기를 먼저 터치해주세요!");
        const type = document.getElementById('fishType').value;
        const name = document.getElementById('fisherName').value || "조사";
        const score = (window.finalCm / (STANDARDS[type] || 50)) * 100;
        let rank, msg;
        if (score >= 95) { rank = "전설의 조사"; msg = "용왕님이 형님 소리 하겠는데요!"; }
        else if (score >= 80) { rank = "용왕의 아들"; msg = "어깨 좀 펴도 되는 대물입니다!"; }
        else { rank = "도시 어부"; msg = "손맛 축하드립니다!"; }
        document.getElementById('res-rank').innerText = rank;
        document.getElementById('res-size').innerText = `${type} / ${window.finalCm}cm`;
        document.getElementById('res-msg').innerText = `"${name}님, ${msg}"`;
        document.getElementById('result-card').style.display = "block";
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>

</body>
</html>
